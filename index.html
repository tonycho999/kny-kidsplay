<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>어린이 물놀이장 예약</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 메인 페이지 이미지 스타일 */
        .intro-text {
            margin-bottom: 2rem;
            font-size: 1.1rem;
            color: #555;
            text-align: center;
        }

        /* ⭐️ 1장의 이미지를 중앙에 예쁘게 배치하는 스타일 */
        .single-image-wrapper {
            width: 100%;
            max-width: 1200px; /* 전체 가로 최대 폭 */
            margin: 0 auto 3rem auto; /* 상하 마진 및 좌우 완벽 중앙 정렬 */
            padding: 0 15px; /* 모바일 좌우 여백 */
            box-sizing: border-box;
            text-align: center;
        }

        .single-image-wrapper img {
            width: 100%; /* 화면 폭에 맞춰 꽉 차게 */
            max-height: 800px; /* 너무 길어지는 것 방지 */
            object-fit: contain; /* 이미지가 잘리지 않고 원본 비율 유지 */
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .single-image-wrapper img:hover {
            transform: scale(1.02); /* 마우스 올렸을 때 살짝 커지는 효과 */
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container">
        <h1 style="text-align: center; margin-top: 2rem;">환영합니다!</h1>
        <p class="intro-text">성북구 어린이 물놀이장의 생생한 현장 모습을 확인하시고, 상단 메뉴를 통해 예약을 진행해 주세요.</p>
        
        <!-- ⭐️ 이미지가 들어갈 공간 -->
        <div class="single-image-wrapper">
            <img src="public/images/성북문화바캉스.png" alt="성북문화바캉스 포스터">
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/main.js"></script>
    <script>
        async function loadIncludes() {
            try {
                // 헤더 불러오기
                const headerRes = await fetch('header.html');
                document.getElementById('header-placeholder').innerHTML = await headerRes.text();
                
                // 푸터 불러오기
                const footerRes = await fetch('footer.html');
                document.getElementById('footer-placeholder').innerHTML = await footerRes.text();
                
                // 모바일 메뉴 토글 이벤트 바인딩
                const menuToggle = document.getElementById('menuToggle');
                const navMenu = document.getElementById('navMenu');
                if (menuToggle && navMenu) {
                    menuToggle.addEventListener('click', () => {
                        navMenu.classList.toggle('active');
                    });
                }
            } catch (error) {
                console.error("헤더/푸터를 불러오는데 실패했습니다.", error);
            }
        }
        
        loadIncludes();
    </script>
</body>
</html>
