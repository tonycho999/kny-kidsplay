<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>운영기간안내 - 성북문화바캉스</title>
    <link rel="stylesheet" href="css/style.css?v=2">
    <style>
        .info-card {
            background: #fff;
            border-radius: 12px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            border: 1px solid #eef0f5;
        }
        
        .main-title {
            text-align: center;
            color: #00438a;
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }
        
        .sub-title {
            text-align: center;
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 2rem;
        }

        .info-box {
            background: #f8fbff;
            padding: 1.5rem;
            border-radius: 8px;
            border-left: 5px solid #0056b3;
        }

        .info-box h4 {
            color: #0056b3;
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-box p {
            margin: 0;
            color: #333;
            font-size: 1.05rem;
            line-height: 1.6;
            word-break: keep-all;
        }

        .highlight-text {
            color: #d9534f;
            font-weight: bold;
        }

        /* ⭐️ 모바일 반응형 (가로로 두 칸이던 걸 세로 한 칸으로) */
        @media (max-width: 768px) {
            .info-grid {
                grid-template-columns: 1fr;
            }
            .info-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container">
        <h2 style="text-align: center; margin-bottom: 2rem;">운영 안내</h2>

        <div class="info-card">
            <div class="main-title">제7회 성북문화바캉스</div>
            <div class="sub-title">도심 속에서 즐기는 신나는 물놀이!</div>

            <div class="info-grid">
                <!-- 1. 일시 -->
                <div class="info-box">
                    <h4>📅 일 시</h4>
                    <p>
                        <strong>2026. 7. 31.(금) ~ 8. 9.(일)</strong><br>
                        <span style="font-size: 0.95em; color: #555;">※ 10일간 운영 (휴장일 없음)</span>
                    </p>
                </div>

                <!-- 2. 장소 -->
                <div class="info-box">
                    <h4>📍 장 소</h4>
                    <p>
                        <strong>길음동 유휴부지</strong><br>
                        <span style="font-size: 0.95em; color: #555;">(길음 복합문화체육센터 건립 부지)</span>
                    </p>
                </div>

                <!-- 3. 대상 및 요금 -->
                <div class="info-box">
                    <h4>👨‍👩‍👧‍👦 대 상 및 요 금</h4>
                    <p>
                        <strong>어린이 및 동반가족</strong><br>
                        <span class="highlight-text">전석 무료 입장</span>
                    </p>
                </div>

                <!-- 4. 운영 시간표 -->
                <div class="info-box" style="border-left-color: #28a745; background: #f4fdf6;">
                    <h4 style="color: #28a745;">⏰ 운영 시간 (1일 2부제)</h4>
                    <p>
                        <strong>[1부]</strong> 10:00 ~ 13:00<br>
                        <strong>[휴식 및 수질정비]</strong> 13:00 ~ 14:00<br>
                        <strong>[2부]</strong> 14:00 ~ 17:00<br>
                        <span style="font-size: 0.85em; color: #666; display:inline-block; margin-top:5px;">※ 매시간 50분 운영 / 10분 휴식 진행</span>
                    </p>
                </div>
            </div>
        </div>

    </main>

    <div id="footer-placeholder"></div>

    <script src="js/main.js"></script>
    <script>
        async function loadIncludes() {
            try {
                const headerRes = await fetch('header.html');
                document.getElementById('header-placeholder').innerHTML = await headerRes.text();
                
                const footerRes = await fetch('footer.html');
                document.getElementById('footer-placeholder').innerHTML = await footerRes.text();
                
                const menuToggle = document.getElementById('menuToggle');
                const navMenu = document.getElementById('navMenu');
                if (menuToggle && navMenu) {
                    menuToggle.addEventListener('click', () => { navMenu.classList.toggle('active'); });
                }
            } catch (error) { console.error("헤더/푸터 로드 실패", error); }
        }
        loadIncludes();
    </script>
</body>
</html>
